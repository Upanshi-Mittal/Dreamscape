version: "3.8"

services:
  mongo:
    image: mongo
    container_name: try_krte_hai
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoadmin
      MONGO_INITDB_ROOT_PASSWORD: secret
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: my_backend
    ports:
      - "8080:8080"
    environment:
      MONGO_CONN: mongodb://mongoadmin:secret@mongo:27017/mydb?authSource=admin
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: my_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data: